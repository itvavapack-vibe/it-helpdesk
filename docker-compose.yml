services:
  helpdesk-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helpdesk-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # ช่วยเรื่อง Hot Reload บน Windows
    volumes:
      - .:/app
      - /app/node_modules # ป้องกันไม่ให้ node_modules จากเครื่อง host ไปทับใน container
    env_file:
      - .env

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helpdesk-api
    restart: unless-stopped
    command: ["npm", "run", "start:api"]
    ports:
      - "4000:4000"
    environment:
      - API_PORT=4000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=helpdsk_db
      - DB_USER=helpdesk_user
      - DB_PASSWORD=HelpDeskPass123!
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8
    container_name: helpdesk-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=RootPass!123
      - MYSQL_DATABASE=helpdsk_db
      - MYSQL_USER=helpdesk_user
      - MYSQL_PASSWORD=HelpDeskPass123!
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./schema_mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
